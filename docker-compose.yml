services:
  postgres:
    image: postgres:16-alpine
    container_name: agendadorplus-db
    environment:
      POSTGRES_DB: agendadorplus
      POSTGRES_USER: agendador
      POSTGRES_PASSWORD: agendador_secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agendador -d agendadorplus"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
